name: Modal Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Modal CLI
        run: |
          python -m pip install --upgrade pip
          pip install modal

      - name: Deploy with Modal
        env:
          MODAL_TOKEN_ID: ${{ ak-4QmPIaq9ZpNbVQB7sr9xlJ }}
          MODAL_TOKEN_SECRET: ${{ as-tdnLK7mlfZd6sfqwsE8jG4 }}
        run: |
          set -euo pipefail
          modal deploy main.py
